<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet"
        crossorigin="anonymous">

    <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">
    <title>Ear We Go!</title>
</head>

<body>
    <!-- Nav Bar -->
    <nav class="navbar navbar-expand-lg custom-navbar" aria-label="Main Navigation">
        <div class="container-fluid">
            <a class="navbar-brand" href="{{ url_for('render_homepage') }}">Ear We Go!</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup"
                aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" href="{{ url_for('render_learnpage', id=1) }}">Orchestra</a>
                    <a class="nav-link" href="{{ url_for('render_learnpage', id=3) }}">Strings</a>
                    <a class="nav-link" href="{{ url_for('render_learnpage', id=4) }}">Woodwinds</a>
                    <a class="nav-link" href="{{ url_for('render_learnpage', id=5) }}">Brass</a>
                    <a class="nav-link" href="{{ url_for('render_learnpage', id=6) }}">Percussion</a>
                    <a class="btn btn-outline-light ms-2" href="{{ url_for('render_transitionpage', id=3) }}">Quiz</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container-fluid mt-4 mb-5">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer Buttons -->
    {% block nav_buttons %}{% endblock %}

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-1.12.4.js"></script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/js/bootstrap.min.js"
        crossorigin="anonymous"></script>

    <!-- Optional JS -->
    <script src="{{ url_for('static', filename='lesson-nav.js') }}"></script>
</body>

</html>
