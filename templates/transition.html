{% extends "layout.html" %}

{% block content %}
<div class="container-fluid mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center">
            {% if transition.title %}
            <h1>{{ transition.title | safe }}</h1>
            {% endif %}

            <p class="lead mt-4">{{ transition.text | safe }}</p>

            <a href="{{ cta_url }}" class="btn btn-dark btn-lg mt-4">
                {{ transition.button }}
            </a>
        </div>
    </div>
</div>
{% endblock %}

{% block nav_buttons %}
<nav class="navbar footer fixed-bottom bg-dark" role="navigation" aria-label="Transition navigation">
    <div class="container-fluid">
        <div>
            {% if prev_url %}
            <a class="btn btn-outline-light" href="{{ prev_url }}">Back</a>
            {% endif %}
        </div>

        <div>
            {% if next_url %}
            <a class="btn btn-light" href="{{ next_url }}">Next</a>
            {% endif %}
        </div>
    </div>
</nav>
{% endblock %}
