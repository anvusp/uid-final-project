{% extends "layout.html" %}

{% block content %}
<div class="container mt-5 pt-5">
    <div class="row justify-content-center">
        <div class="col-lg-6 text-center">
            {% if transition.title%}
                <h1>{{ transition.title | safe }}</h1>
            {% endif %}
            <p class="mt-4">{{ transition.text | safe}}</p>
            {% if transition.button%}
                <a href="{{ transition.href }}" class="btn btn-dark w-25 mt-4">{{ transition.button }}</a>
            {% endif %}
        </div>
    </div>
</div>

{% endblock %}
