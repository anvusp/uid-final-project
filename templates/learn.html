{% extends "layout.html" %}

{% block content %}
<div class="container-fluid mt-5">
    <div class="row">
        <div class="col-8">
            <div class="img-wrapper"> 
                <img src="{{ url_for('static', filename=lesson.image) }}" class="img-fluid" alt="{{ lesson.title }}">
            </div>
        </div>
        <div class="col-4">
            <h1 id="lesson-title">{{ lesson.title }}</h1>
            <p>{{ lesson.description | safe}}</p>

            {% if lesson.audio %}
                <p> Listen to {{ lesson.title | safe}}:</p>
                <audio controls>
                    <source src="{{ url_for('static', filename=lesson.audio) }}" type="audio/mpeg">
                    Your browser does not support the audio element.
                </audio>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}

{% block nav_buttons %}
<nav class="navbar footer fixed-bottom bg-dark " role="Footer">
    <div class="container-fluid">
        <a class="nav-link back-button" aria-current="page" href="#">Back</a>
        <a class="nav-link next-button" aria-current="page" data-current-lesson-id="{{ lesson.id }} href="#">Next</a>
    </div>
</nav>
{% endblock %}
