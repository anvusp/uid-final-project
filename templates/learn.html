{% extends "layout.html" %}

{% block content %}
<div class="container-fluid mt-4">
    <div class="row align-items-start">
        <div class="col-md-8">
            <div class="img-wrapper">
                <img src="{{ url_for('static', filename=lesson.image) }}" class="img-fluid" alt="{{ lesson.title }}">
            </div>
        </div>

        <div class="col-md-4">
            <h1 id="lesson-title">{{ lesson.title }}</h1>
            <p>{{ lesson.description | safe }}</p>

            {% if lesson.audio %}
            <p><strong>Listen to {{ lesson.title }}:</strong></p>
            <audio controls class="w-100">
                <source src="{{ url_for('static', filename=lesson.audio) }}" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}

{% block nav_buttons %}
<nav class="navbar footer fixed-bottom bg-dark" role="navigation" aria-label="Lesson navigation">
    <div class="container-fluid">
        <div>
            {% if prev_url %}
            <a class="btn btn-outline-light" href="{{ prev_url }}">Back</a>
            {% endif %}
        </div>

        <div>
            {% if next_url %}
            <a class="btn btn-light" href="{{ next_url }}">Next</a>
            {% endif %}
        </div>
    </div>
</nav>
{% endblock %}
